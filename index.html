<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Private Surprise 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --pink:       #FF6FA8;
    --pink-light: #FFD6E7;
    --pink-pale:  #FFF0F6;
    --lav:        #C9A8FF;
    --lav-light:  #EDE0FF;
    --peach:      #FFB07C;
    --text-dark:  #3A2040;
    --text-mid:   #7A5080;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--text-dark);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, #FFD6E7 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 80% 80%, #EDE0FF 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, #DFFAF0 0%, transparent 70%),
      #FFF0F6;
  }

  /* Floating hearts */
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .heart-float {
    position: absolute; opacity: 0;
    animation: floatHeart linear infinite;
  }
  @keyframes floatHeart {
    0%   { transform: translateY(106vh) scale(0.6) rotate(-10deg); opacity: 0; }
    8%   { opacity: .5; }
    92%  { opacity: .2; }
    100% { transform: translateY(-12vh) scale(1.3) rotate(12deg); opacity: 0; }
  }

  /* Card */
  .card {
    position: relative; z-index: 2;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(18px);
    border-radius: 40px;
    box-shadow: 0 16px 48px rgba(180,100,160,0.28);
    border: 2.5px solid rgba(255,182,210,0.5);
    padding: 48px 40px 40px;
    max-width: 420px; width: 100%;
    text-align: center;
    animation: cardFloat 4s ease-in-out infinite;
  }
  @keyframes cardFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }

  /* Glow ring */
  .glow {
    position: absolute; inset: -5px; border-radius: 45px;
    background: linear-gradient(135deg, #FFD6E7, #EDE0FF, #DFFAF0);
    z-index: -1;
    animation: glowPulse 2.5s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity: .6; filter: blur(8px); }
    50%     { opacity: 1;  filter: blur(14px); }
  }

  .lock-emoji { font-size: 3.2rem; margin-bottom: 12px; }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    color: var(--pink);
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(255,111,168,0.25);
  }

  .hint {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 3.5vw, 1.2rem);
    color: var(--text-mid);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* Password input */
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .input-wrap input {
    width: 100%;
    padding: 14px 48px 14px 18px;
    border: 2.5px solid var(--pink-light);
    border-radius: 999px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: var(--text-dark);
    background: rgba(255,255,255,0.9);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 2px;
  }
  .input-wrap input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 4px rgba(255,111,168,0.15);
  }
  .input-wrap input.shake {
    animation: inputShake 0.4s ease;
    border-color: #FF7B7B;
  }
  @keyframes inputShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-8px); }
    40%     { transform: translateX(8px); }
    60%     { transform: translateX(-5px); }
    80%     { transform: translateX(5px); }
  }

  /* Eye toggle */
  .eye-btn {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    font-size: 1.1rem; cursor: pointer; padding: 4px;
    opacity: 0.5; transition: opacity 0.2s;
  }
  .eye-btn:hover { opacity: 1; }

  /* Unlock button */
  .btn-unlock {
    width: 100%;
    padding: 14px;
    border: none; border-radius: 999px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem; font-weight: 900;
    cursor: pointer; letter-spacing: 0.3px;
    background: linear-gradient(135deg, var(--pink), var(--peach));
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,111,168,0.4);
    transition: all 0.22s ease;
    position: relative; overflow: hidden;
  }
  .btn-unlock::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.2);
    transform: translateX(-110%) skewX(-10deg);
    transition: transform 0.35s ease;
  }
  .btn-unlock:hover::after { transform: translateX(110%) skewX(-10deg); }
  .btn-unlock:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,111,168,0.45); }
  .btn-unlock:active { transform: scale(0.97); }

  /* Error / success message */
  .msg {
    margin-top: 14px;
    font-size: 0.95rem; font-weight: 700;
    min-height: 22px;
    transition: all 0.3s;
  }
  .msg.err     { color: #E05050; }
  .msg.success { color: #3AA876; }

  /* Attempt counter */
  .attempts {
    margin-top: 8px;
    font-size: 0.78rem;
    color: var(--text-mid);
    opacity: 0.7;
    min-height: 18px;
  }

  /* Enter key hint */
  .enter-hint {
    margin-top: 12px;
    font-size: 0.78rem;
    color: var(--text-mid);
    opacity: 0.55;
  }

  @media (max-width: 480px) {
    .card { padding: 36px 22px 30px; border-radius: 28px; }
    .glow { border-radius: 33px; }
  }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsContainer"></div>

<div class="card">
  <div class="glow"></div>

  <div class="lock-emoji">🔒</div>

  <h1>Special Surprise 💞🧿</h1>
  <p class="hint">
    Only one person knows this password...<br/>
    Is it you? 🤭
  </p>

  <div class="input-wrap">
    <input
      type="password"
      id="passInput"
      placeholder="Enter the secret password"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') unlock()"
    />
    <button class="eye-btn" onclick="toggleEye()" id="eyeBtn" title="Show/hide">👁️</button>
  </div>

  <button class="btn-unlock" onclick="unlock()">
    Unlock the Surprise 💞
  </button>

  <div class="msg" id="msg"></div>
  <div class="attempts" id="attempts"></div>
  <div class="enter-hint">Press Enter or tap the button 🌸</div>
</div>

<script>
  /* ── Floating hearts ── */
  const hc = document.getElementById('heartsContainer');
  const he = ['❤️','🤍','💞','🌸','✨','💕','🫂','🧿'];
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = he[~~(Math.random() * he.length)];
    h.style.cssText = `left:${Math.random()*100}vw;font-size:${0.7+Math.random()*1.1}rem;animation-duration:${8+Math.random()*12}s;animation-delay:${Math.random()*15}s;`;
    hc.appendChild(h);
  }

  /* ── Password logic ── */
  const PASSWORD = "mamma@1011";   // 👉 Change this if you want a different password
  let tries = 0;

  function unlock() {
    const val = document.getElementById('passInput').value;
    const msg = document.getElementById('msg');
    const att = document.getElementById('attempts');
    const inp = document.getElementById('passInput');

    if (val === PASSWORD) {
      msg.textContent = "Correct! Taking you in... 🥰";
      msg.className = 'msg success';
      att.textContent = '';
      // Small delay so she sees the success message before redirect
      setTimeout(() => { window.location.href = "anniversary.html"; }, 900);
    } else {
      tries++;
      inp.classList.remove('shake');
      void inp.offsetWidth;   // reflow to restart animation
      inp.classList.add('shake');
      inp.value = '';

      const wrongMsgs = [
        "Wrong password 😜 Try again!",
        "Nope! Think harder 😏",
        "Ayy that's not it 😂",
        "Almost...just kidding 😅",
        "Nooo! You can do it 💪"
      ];
      msg.textContent = wrongMsgs[Math.min(tries - 1, wrongMsgs.length - 1)];
      msg.className = 'msg err';

      if (tries >= 3) {
        att.textContent = `${tries} attempt${tries>1?'s':''} so far... 🙈`;
      }
    }
  }

  /* ── Eye toggle (show/hide password) ── */
  let eyeOpen = false;
  function toggleEye() {
    eyeOpen = !eyeOpen;
    const inp = document.getElementById('passInput');
    const btn = document.getElementById('eyeBtn');
    inp.type = eyeOpen ? 'text' : 'password';
    btn.textContent = eyeOpen ? '🙈' : '👁️';
  }
</script>
</body>
</html>
